name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Svelte check
        run: pnpm check

      - name: Frontend unit tests
        run: pnpm test:unit

      - name: Frontend build
        run: pnpm build

      - name: Rust check
        run: pnpm check:rust

      - name: Rust tests
        run: pnpm test:rust

      - name: Tauri build
        run: pnpm build:tauri

      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: sypherterm-${{ runner.os }}-bundle
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  audit:
    name: Dependency audit
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: npm dependency audit
        run: pnpm audit:npm

      - name: Rust dependency audit
        run: pnpm audit:rust
